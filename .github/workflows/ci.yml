# pouk.ai — CI (build + supply-chain gates)
#
# Closes the supply-chain trio in meta/backlog.md R25:
#   - R-048 (HARD): secret scan via gitleaks
#   - R-049 (HARD): pnpm audit --prod --audit-level=high
#   - R-064 (HARD): license allow-list check
#
# Also hardens R-054 (HARD) — build must exit 0 on every PR HEAD and on main.
#
# Also closes:
#   - R22 / R-013 / R-056 (HARD) — `lighthouse` job runs lhci against a local
#     `pnpm preview` server. Thresholds in `.lighthouserc.json` per R-013:
#     Perf ≥ 95, A11y/BP/SEO = 1.0 on mobile, three runs per route for flake.
#   - R23 / R-029 / R-057 (HARD) — `axe` job runs @axe-core/cli (the official
#     axe runner; R-057 explicitly accepts "or equivalent") against the same
#     local preview server. Fails on any WCAG 2.1 AA violation.
#
# Both lhci and axe run against `localhost:4321` (the `pnpm preview` server),
# not Vercel's preview URL — that needs a `deployment_status` webhook from
# Vercel's GitHub App, tracked separately. Local-preview catches the
# overwhelming majority of regressions today; Vercel-URL is an iteration.
#
# Also closes R24 / R-058 (conditional HARD) via the `test` job: vitest runs
# every test in `src/**/*.test.{ts,tsx}` with v8 coverage; per-file thresholds
# are enforced at 80% lines/functions/branches/statements per R-058.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same PR. Main pushes always run to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build (R-054)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # Pinned to the engines.node range in package.json (>=20 <21).
          node-version: 20
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        env:
          # NPM_TOKEN is required for @poukai-inc/ui from npm.pkg.github.com per .npmrc.
          # Configure as a repository secret in the GitHub UI (Settings → Secrets and variables → Actions).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build (astro check && astro build)
        run: pnpm build

  audit:
    name: audit — pnpm audit --prod (R-049)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: pnpm audit --prod --audit-level=high
        # R-049 HARD: zero high or critical vulnerabilities at merge time.
        # Moderate findings are allowed but must be acknowledged in the PR description.
        run: pnpm audit --prod --audit-level=high

  secret-scan:
    name: secret-scan — gitleaks (R-048)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs the full history to scan past commits.
          fetch-depth: 0

      # The `gitleaks-action` wrapper requires a paid license for org-owned
      # repos. The `gitleaks` CLI itself (MIT-licensed) is free and identical
      # in detection behavior — we invoke it directly via the GitHub release
      # binary. Same WCAG-of-secret-scanning ruleset; just no action wrapper.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks detect
        # R-048 HARD: zero secrets at merge time. --redact strips secret values
        # from logs (defense-in-depth in case a finding ever surfaces).
        # --exit-code 1 makes any finding fail the CI run.
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  license-check:
    name: license-check — allow-list (R-064)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (prod only)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile --prod

      - name: License allow-list
        # R-064 HARD: every prod dep must be on the allow-list or carry a
        # documented exception. See .github/scripts/license-check.mjs for the
        # allow-list, the exception list (with per-package rationale), and the
        # governance contract for adding either.
        run: pnpm licenses list --prod --json | node .github/scripts/license-check.mjs

  lighthouse:
    name: lighthouse — lhci (R-013, R-056)
    runs-on: ubuntu-latest
    # Independent of the build job — surfaces its own build error if it can't
    # produce dist/ — so a flaky lhci run doesn't mask a real build failure
    # in the upstream `build` job, and vice versa.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build (lhci serves dist/ via `pnpm preview`)
        run: pnpm build

      - name: Run lighthouse-ci
        # R-013 HARD thresholds: Perf ≥ 95, A11y/BP/SEO = 1.0 on mobile.
        # Three runs per route — lhci takes the median, which absorbs the 1–2
        # point Performance flake D-14 warned about.
        # Config: .lighthouserc.json at repo root. Pin lhci version explicitly;
        # bumping is a deliberate change reviewed in its own PR.
        run: pnpm dlx "@lhci/cli@0.14.0" autorun

      - name: Upload Lighthouse reports
        # R-056 HARD: CI artifact archive contains the Lighthouse JSON; the
        # reviewer cites it in the review's "Build & metrics" block.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30

  axe:
    name: axe — accessibility (R-029, R-057)
    runs-on: ubuntu-latest
    # Independent of lighthouse — distinct failure surface (a11y vs perf/SEO).
    # Mixing them would hide one behind the other in a red run.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start preview server
        # R-057 wording allows "@axe-core/playwright (or equivalent axe-core
        # runner)" — we use @axe-core/cli which is the official axe runner
        # backed by puppeteer. Same WCAG ruleset, lighter dependency footprint
        # than wiring up the Playwright test framework. Move to @axe-core/playwright
        # if/when we add a Playwright suite for E2E coverage.
        run: pnpm preview --port 4321 &
        # Server runs as background process; killed when the job exits.

      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4321/ > /dev/null; then
              echo "preview ready on http://localhost:4321/"
              exit 0
            fi
            sleep 1
          done
          echo "::error::preview server did not start within 30s"
          exit 1

      - name: Run axe against all four routes
        # R-029 HARD: zero axe violations on every preview deploy.
        # --exit makes a violation non-zero exit (CI red).
        # Default tag set: wcag2a, wcag2aa, wcag21a, wcag21aa, best-practice — matches
        # what R-029's source masterplan §6.1 expects.
        # --save dumps per-URL JSON into the artifact directory.
        #
        # pnpm 10 blocks postinstall scripts by default (the supply-chain
        # hardening that makes R-048 + R-049 cheap). `chromedriver`'s
        # postinstall downloads the actual driver binary, so we have to
        # explicitly allow it for this `pnpm dlx` invocation via
        # `--allow-build=chromedriver`. Scoped to this command only — local
        # installs are unaffected.
        run: |
          mkdir -p .axe-reports
          pnpm dlx --allow-build=chromedriver "@axe-core/cli@4.10.0" \
            http://localhost:4321/ \
            http://localhost:4321/why-ai/ \
            http://localhost:4321/roles/ \
            http://localhost:4321/principles/ \
            --save .axe-reports/results.json \
            --exit

      - name: Upload axe reports
        # R-057 HARD: CI artifact archive contains the axe JSON.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-reports
          path: .axe-reports/
          retention-days: 30

  test:
    name: test — vitest + coverage (R-058)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        # R-058 (conditional HARD): pnpm test must exit 0 when tests exist;
        # per-file coverage ≥ 80% on lines/functions/branches/statements.
        # Thresholds live in vitest.config.ts so they're versioned next to
        # the runner config and the absence-of-tests case stays a NIT, not
        # a CI failure (vitest passes through an empty test run with no
        # files matched, and the coverage threshold only applies to tracked
        # `src/components/**/*.{ts,tsx}` files that actually have tests).
        run: pnpm test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

  argos:
    name: argos — visual regression
    runs-on: ubuntu-latest
    # Non-blocking until the ARGOS_TOKEN secret + Argos project exist.
    # The job still runs (so we discover wiring issues early) but a failed
    # upload doesn't gate PR merges. Flip to required-check in branch
    # protection once the Argos project has produced its first baseline
    # against `main`. See meta/backlog.md — "Ongoing visual regression".
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        # Argos uses git history to map a screenshot to the commit + base
        # branch. `fetch-depth: 0` gives it the full graph; cheaper than
        # asking Argos to clone separately.
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Bump the suffix when Playwright version changes to invalidate
          # the cache; the key already includes the version via the lockfile
          # hash so most bumps invalidate automatically.
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        # pnpm 10 blocks postinstall scripts (R-048 / R-049 hardening), so
        # the playwright package's browser-download postinstall doesn't run.
        # We invoke it explicitly here and scope `--allow-build` to this
        # command only. `--with-deps` pulls in the system libs Chromium
        # needs on Ubuntu runners.
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm dlx --allow-build=playwright playwright@1.60.0 install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run visual tests + upload to Argos
        env:
          # Required for the upload. Set in repo settings → Secrets and
          # variables → Actions. Until set, the reporter logs a warning and
          # the job exits non-zero — `continue-on-error` above keeps that
          # from blocking PRs.
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: pnpm test:visual

      - name: Upload Playwright artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: ignore
